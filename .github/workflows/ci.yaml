name: CI Pipeline

on:
  push:
    branches:
      - main
      - devel
      - stage
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main
      - devel
      - stage

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: npm install

      - name: Archive node_modules
        run: tar -czf node_modules.tar.gz node_modules

      - name: Upload node_modules
        uses: actions/upload-artifact@v4
        with:
          name: node-modules-${{ github.run_id }}
          path: node_modules.tar.gz
          retention-days: 1

  lint:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ github.run_id }}

      - name: Extract node_modules
        run: tar -xzf node_modules.tar.gz

      - name: Run linter
        run: npm run lint

  test:
    needs: [install]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ github.run_id }}

      - name: Extract node_modules
        run: tar -xzf node_modules.tar.gz

      - name: Run tests
        env:
          CI: true
          REACT_APP_API_URL: https://api.rdicidr.example.com
        run: npm run test

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version-file: '.nvmrc'

      - name: Restore node_modules
        uses: actions/download-artifact@v4
        with:
          name: node-modules-${{ github.run_id }}

      - name: Extract node_modules
        run: tar -xzf node_modules.tar.gz

      - name: Build project
        env:
          REACT_APP_API_URL: https://api.rdicidr.example.com
        run: npm run build
